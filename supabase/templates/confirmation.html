<!doctype html>
<html lang="pt-BR">
  <body style="margin:0;background:#f7f1e8;font-family:Arial,sans-serif;color:#4a0f14">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center" style="padding:32px 16px">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background:#ffffff;border:1px solid #eadfce">
            <tr>
              <td style="background:#5b1018;padding:24px 28px;color:#ffffff;font-size:22px;font-weight:700">
                Lucro da Carne
              </td>
            </tr>
            <tr>
              <td style="padding:28px">
                <h1 style="margin:0 0 16px;font-size:24px;color:#4a0f14">Confirme seu cadastro</h1>
                <p style="margin:0 0 14px;line-height:1.6">Ola, {{ .Data.name }}.</p>
                <p style="margin:0 0 14px;line-height:1.6">
                  Confirme seu e-mail para iniciar os 3 dias de acesso gratuito ao Lucro da Carne.
                </p>
                <p style="margin:24px 0">
                  <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#d1a23d;color:#2d1208;text-decoration:none;font-weight:700;padding:14px 20px">
                    Confirmar e acessar
                  </a>
                </p>
                <p style="margin:0;line-height:1.6;color:#76685d">
                  Se voce nao criou esta conta, ignore este e-mail. Precisa de ajuda? Responda esta mensagem.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
